<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <main class="page-shell">
    <aside class="site-sidebar" aria-label="Portfolio sidebar">
      <div class="window-dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="sidebar-title">
        <strong id="siteTitle">Samet Tunuz</strong>
        <span id="siteSubtitle">Portfolio Archive</span>
      </div>

      <button class="sidebar-link is-active" id="overviewButton" type="button">
        <span class="tiny-folder"></span>
        Overview
      </button>

      <div class="sidebar-rule"></div>

      <p class="sidebar-label">Selected Work</p>
      <nav class="folder-nav" id="selectedNav"></nav>

      <div class="sidebar-rule"></div>

      <p class="sidebar-label">Experiments</p>
      <nav class="folder-nav" id="experimentsNav"></nav>

      <div class="sidebar-rule"></div>

      <p class="sidebar-label">Links</p>
      <nav class="link-nav" id="linkNav"></nav>
    </aside>

    <section class="finder-panel" id="finderPanel" aria-label="Finder portfolio panel">
      <header class="finder-header">
        <button class="back-button" id="backButton" type="button" aria-label="Back">
          <span></span>
        </button>

        <div class="finder-title">
          <strong id="currentTitle">Overview</strong>
          <span id="currentMeta">Double click a folder to open it</span>
        </div>

        <div class="finder-actions">
          <button class="edit-button" id="editModeButton" type="button">Düzenle</button>
          <button class="reset-button" id="resetFolderButton" type="button">Sıfırla</button>
        </div>

        <button class="close-button" id="closeButton" type="button" aria-label="Close">
          <span></span>
        </button>
      </header>

      <div class="finder-content">
        <div class="finder-rows" id="finderRows"></div>
      </div>
    </section>

    <button class="open-finder" id="openFinder" type="button">
      <span class="finder-face" aria-hidden="true"></span>
      Open Finder
    </button>
  </main>

  <div class="image-modal" id="imageModal" aria-hidden="true">
    <button class="modal-backdrop" id="modalBackdrop" type="button" aria-label="Close preview"></button>
    <figure class="modal-card">
      <button class="modal-close" id="modalClose" type="button" aria-label="Close preview">×</button>
      <button class="modal-nav modal-prev" id="modalPrev" type="button" aria-label="Previous image">
        <span></span>
      </button>
      <img id="modalImage" src="" alt="">
      <button class="modal-nav modal-next" id="modalNext" type="button" aria-label="Next image">
        <span></span>
      </button>
      <figcaption id="modalTitle"></figcaption>
    </figure>
  </div>

  <div class="pdf-modal" id="pdfModal" aria-hidden="true">
    <button class="pdf-backdrop" id="pdfBackdrop" type="button" aria-label="Close preview"></button>
    <section class="pdf-window" aria-label="PDF pages">
      <header class="pdf-header">
        <strong id="pdfTitle">Portfolio</strong>
        <button class="pdf-close" id="pdfClose" type="button" aria-label="Close preview">x</button>
      </header>
      <div class="pdf-pages" id="pdfPages"></div>
    </section>
  </div>

  <div class="note-modal" id="noteModal" aria-hidden="true">
    <button class="note-backdrop" id="noteBackdrop" type="button" aria-label="Close note"></button>
    <article class="note-window">
      <header class="note-header">
        <div class="window-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <strong id="noteTitle">about me.rtf</strong>
        <button class="note-close" id="noteClose" type="button" aria-label="Close note">×</button>
      </header>
      <div class="note-body" id="noteBody"></div>
    </article>
  </div>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
